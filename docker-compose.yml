services:
  classificatore_nps:
    build: ./ClassificatoreNPS
    container_name: clas_nps
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./ClassificatoreNPS/model:/ClassificatoreNPS/model
      - ./ClassificatoreNPS/datasetNPS:/ClassificatoreNPS/datasetNPS

  correction_dispersion:
    build: ./CorrectionDispersion
    container_name: correction_dispersion
    ports:
      - "8001:8001"
    restart: unless-stopped
    volumes:
      - ./CorrectionDispersion/models:/CorrectionDispersion/models

  gaussian_puff:
    build: ./gaussianPuff
    container_name: gaussian_dispersion_model
    ports:
      - "8002:8002"
    restart: unless-stopped

  source_localization:
    build: ./EmissionSourceLocalization
    container_name: loc_emission_source
    ports:
      - "8003:8003"
    restart: unless-stopped
    volumes:
      - ./EmissionSourceLocalization/models:/EmissionSourceLocalization/models

  correction_piml:
    build: ./CorrectionDispersion_PIML
    container_name: correction_dispersion_piml
    ports:
      - "8008:8008"
    restart: unless-stopped
    depends_on:
      - gaussian_puff
    volumes:
      - ./CorrectionDispersion_PIML/models:/CorrectionDispersion_PIML/models

  source_localization_piml:
    build: ./EmissionSourceLocalization_PIML
    container_name: loc_emission_source_piml
    ports:
      - "8010:8010"
    restart: unless-stopped
    depends_on:
      - gaussian_puff
    volumes:
      - ./EmissionSourceLocalization_PIML/models:/EmissionSourceLocalization_PIML/models

  # -------------------- MLOps Layer 1–5 --------------------
  mlops_ingestion:
    build: ./MLOps
    container_name: mlops_ingestion
    command: uvicorn api_ingestion:app --host 0.0.0.0 --port 8011
    ports:
      - "8011:8011"
    volumes:
      - ./gaussianPuff:/gaussianPuff
      - ./logs:/logs
      - ./CorrectionDispersion_PIML/models:/CorrectionDispersion_PIML/models
      - ./EmissionSourceLocalization_PIML/models:/EmissionSourceLocalization_PIML/models
      - ./ClassificatoreNPS/datasetNPS:/ClassificatoreNPS/datasetNPS
    restart: unless-stopped
    depends_on:
      - correction_piml
      - source_localization_piml

  mlops_monitoring:
    build: ./MLOps
    container_name: mlops_monitoring
    command: uvicorn monitoring_service:app --host 0.0.0.0 --port 8012
    ports:
      - "8012:8012"
    volumes:
      - ./logs:/logs
      - ./gaussianPuff:/gaussianPuff
      - ./CorrectionDispersion_PIML/models:/CorrectionDispersion_PIML/models
      - ./EmissionSourceLocalization_PIML/models:/EmissionSourceLocalization_PIML/models
    restart: unless-stopped

  mlops_forensic:
    build: ./MLOps
    container_name: mlops_forensic
    command: uvicorn forensic_logger:app --host 0.0.0.0 --port 8013
    ports:
      - "8013:8013"
    volumes:
      - ./logs:/logs
      - ./gaussianPuff:/gaussianPuff
      - ./CorrectionDispersion_PIML/models:/CorrectionDispersion_PIML/models
      - ./EmissionSourceLocalization_PIML/models:/EmissionSourceLocalization_PIML/models
    restart: unless-stopped
    depends_on:
      - mlops_ingestion
      - mlops_monitoring

  mlops_retrain:
    build: ./MLOps
    container_name: mlops_retrain
    command: uvicorn mock_retrain:app --host 0.0.0.0 --port 8014
    ports:
      - "8014:8014"
    volumes:
      - ./logs:/logs
      - ./gaussianPuff:/gaussianPuff
      - ./CorrectionDispersion_PIML:/CorrectionDispersion_PIML
      - ./EmissionSourceLocalization_PIML/models:/EmissionSourceLocalization_PIML/models
    restart: unless-stopped
    depends_on:
      - mlops_monitoring

  # -------------------- UI --------------------
  pention_system:
    build: ./PentionSystem
    container_name: pention_system
    ports:
      - "8004:8004"
    restart: unless-stopped
    volumes:
      - ./gaussianPuff:/PentionSystem/gaussianPuff
      - ./ClassificatoreNPS/model:/PentionSystem/ClassificatoreNPS/model
      - ./logs:/logs

  pentionsystem_m:
    build: ./PentionSystem_M
    container_name: pentionsystem_m
    ports:
      - "8005:8005"
    restart: unless-stopped
    volumes:
      - ./logs:/logs
      - ./osm_cache:/app/cache
      - ./ClassificatoreNPS/datasetNPS:/app/datasetNPS
    depends_on:
      - mlops_ingestion
      - mlops_monitoring
      - mlops_forensic
